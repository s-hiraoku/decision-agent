name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Type check (pyright, strict)
        run: uv run pyright
      - name: Run tests
        run: PYTHONPATH=src uv run python -m unittest discover -s tests
